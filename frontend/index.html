<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Torrent Stream Player — x265/AC3/Multi-Audio/Subs</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ff6b35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/video.js@8.21.0/dist/video-js.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>🎬 Torrent Stream Player</h1>
      <p class="subtitle">x265 HEVC · AC3 · Multi-Audio · Subtitles · Laptop & Mobile</p>
    </header>

    <section class="input-section">
      <div class="magnet-input">
        <input 
          type="text" 
          id="magnetInput" 
          placeholder="Paste magnet link here..." 
          autocomplete="off"
        />
        <button id="addBtn" class="btn-primary">▶ Load Torrent</button>
      </div>
      <div class="examples">
        <small>Or try: <code>magnet:?xt=urn:btih:...</code></small>
      </div>
    </section>

    <section class="torrents-list" id="torrentsList">
      <!-- Active torrents rendered here -->
    </section>

    <section class="player-section" id="playerSection" style="display:none;">
      <div class="video-wrapper">
        <video 
          id="videoPlayer" 
          class="video-js vjs-big-play-centered vjs-fluid"
          controls
          preload="auto"
          crossorigin="anonymous"
          playsinline
        >
          <p class="vjs-no-js">Enable JavaScript to play video.</p>
        </video>
      </div>

      <div class="controls-bar">
        <div class="control-group">
          <label>🎵 Audio Track</label>
          <select id="audioSelect"></select>
        </div>
        <div class="control-group">
          <label>💬 Subtitles</label>
          <select id="subSelect">
            <option value="">Off</option>
          </select>
        </div>
        <div class="control-group">
          <label>⚡ Quality</label>
          <select id="qualitySelect">
            <option value="auto">Auto</option>
          </select>
        </div>
      </div>

      <div class="info-panel" id="infoPanel">
        <div class="info-grid">
          <div class="info-item"><span class="label">Status:</span> <span id="statusText">—</span></div>
          <div class="info-item"><span class="label">Download:</span> <span id="dlProgress">0%</span></div>
          <div class="info-item"><span class="label">Transcode:</span> <span id="tcProgress">0%</span></div>
          <div class="info-item"><span class="label">Speed:</span> <span id="speedText">—</span></div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <p>Works on Chrome, Safari, Firefox · Mobile & Desktop</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/video.js@8.21.0/dist/video.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.20/dist/hls.min.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
